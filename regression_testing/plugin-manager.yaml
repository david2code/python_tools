                  '@type': type.googleapis.com/envoy.extensions.filters.http.composite.v3.Composite
              xds_matcher:
                matcher_list:
                  matchers:
                    - predicate:
                        or_matcher:
                          predicate:
                            - single_predicate:
                                input:
                                  name: envoy.type.matcher.v3.HttpRequestHeaderMatchInput
                                  typed_config:
                                    '@type': type.googleapis.com/envoy.type.matcher.v3.HttpRequestHeaderMatchInput
                                    header_name: sr-vsmatched
                                value_match:
                                  prefix: "false"
                            - single_predicate:
                                input:
                                  name: envoy.type.matcher.v3.HttpRequestHeaderMatchInput
                                  typed_config:
                                    '@type': type.googleapis.com/envoy.type.matcher.v3.HttpRequestHeaderMatchInput
                                    header_name: host
                                value_match:
                                  exact: 127.0.0.1:1000
                      on_match:
                        action:
                          name: envoy.extensions.filters.http.composite.v3.ExecuteFilterAction
                          typed_config:
                            '@type': type.googleapis.com/envoy.extensions.filters.http.composite.v3.ExecuteFilterAction
                            typed_config:
