                text_format: "start_time:%START_TIME(%s.%9f)%, protocol:%PROTOCOL%, scheme:%REQ(:SCHEME)%, method:%REQ(:METHOD)%, host:%REQ(HOST)%, authority:%REQ(:AUTHORITY)%, path:%REQ(:PATH)%, user_agent:%REQ(USER-AGENT)%, x-envoy_original_path:%REQ(X-ENVOY-ORIGINAL-PATH)%, referer:%REQ(REFERER)%, x_forwarded_for:%REQ(X-FORWARDED-FOR)%, x_forwarded_host:%REQ(X-FORWARDED-HOST)%, content_type:%REQ(CONTENT-TYPE)%, accept:%REQ(ACCEPT)%, request_headers_bytes:%REQUEST_HEADERS_BYTES%, bytes_received:%BYTES_RECEIVED%, x_request_id:%REQ(x-request-id)%, response_code:%RESPONSE_CODE%, response_flags:%RESPONSE_FLAGS%, response_code_details:%RESPONSE_CODE_DETAILS%, response_content_type:%RESP(CONTENT-TYPE)%, response_headers_bytes:%RESPONSE_HEADERS_BYTES%, bytes_sent:%BYTES_SENT%, response_trailers_bytes:%RESPONSE_TRAILERS_BYTES%, downstream_remote_address:%DOWNSTREAM_REMOTE_ADDRESS%, downstream_local_address:%DOWNSTREAM_LOCAL_ADDRESS%, downstream_direct_remote_address:%DOWNSTREAM_DIRECT_REMOTE_ADDRESS%, upstream_host:%UPSTREAM_HOST%, upstream_local_address:%UPSTREAM_LOCAL_ADDRESS%, duration:%DURATION%, virtual_cluster_name:%VIRTUAL_CLUSTER_NAME%, route_name:%ROUTE_NAME%, upstream_cluster:%UPSTREAM_CLUSTER%, request_duration:%REQUEST_DURATION%, request_tx_duration:%REQUEST_TX_DURATION%, response_duration:%RESPONSE_DURATION%, response_tx_duration:%RESPONSE_TX_DURATION%\n"

