          - name: envoy.access_loggers.file
            filter:
              header_filter:
                header:
                  name: "User-Agent"
                  string_match:
                    exact: "nuclei"
                  invert_match: true
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.file.v3.FileAccessLog
              path: /data/envoy/body_log/body_plugin.log
              # path: /dev/null
              # async: true
              log_format:
                # omit_empty_values: false
                # text_format: "unique_id: %UNIQUE_ID%, user_name: %USER_NAME%, app_id: %APP_ID%, rule_id: %RULE_ID%, raw_headers: %ALL_REQ_HEADER%,request_id:%REQ(X-REQUEST-ID)%, response_code:%RESPONSE_CODE%, req_line:%REQ_LINE%, resp_line:%RESP_LINE%\n"
                # text_format: "%REQ(X-REQUEST-ID)%:%START_TIME(%s%3f)%:%REQ(Content-Encoding)%:%RESP(Content-Encoding)%:%REQ_LINE%:%ALL_REQ_HEADER_BYTES%:%ALL_RESP_HEADER_BYTES%:%REQUEST_BODY_BYTES%:%RESPONSE_BODY_BYTES%:%ALL_REQ_HEADER%:%ALL_RESP_HEADER%:%REQUEST_BODY%:%RESPONSE_BODY%\n"
                "json_format": {
                 "srhino_proto_format": "true",
                 "srhino_send_to_nsq": "true",
                 "request_id": "%REQ(X-REQUEST-ID)%",
                 "node_id": "%NODE_ID%",
                 "connection_info": {
                  "downstream_remote_address": "%DOWNSTREAM_REMOTE_ADDRESS%",
                  "virtual_cluster_name": "%VIRTUAL_CLUSTER_NAME%",
                  "listener_stat_prefix": "%LISTENER_STAT_PREFIX%",
                  "response_tx_duration": "%RESPONSE_TX_DURATION%",
                  "bytes_received": "%BYTES_RECEIVED%",
                  "bytes_sent": "%BYTES_SENT%",
                  "downstream_direct_remote_address": "%DOWNSTREAM_DIRECT_REMOTE_ADDRESS%",
                  "upstream_host": "%UPSTREAM_HOST%",
                  "upstream_local_address": "%UPSTREAM_LOCAL_ADDRESS%",
                  "duration": "%DURATION%",
                  "request_duration": "%REQUEST_DURATION%",
                  "request_tx_duration": "%REQUEST_TX_DURATION%",
                  "response_duration": "%RESPONSE_DURATION%",
                  "upstream_cluster": "%UPSTREAM_CLUSTER%",
                  "dynamic_metadata_filter": "%DYNAMIC_METADATA(envoy.access_loggers.grpc.filter_access_log)%",
                  "start_time": "%INT64_START_TIME%",
                  "origin_host": "%ORIGIN_HOST%",
                  "downstream_local_address": "%DOWNSTREAM_LOCAL_ADDRESS%",
                  "route_name": "%ROUTE_NAME%",
                  "client_device_fingerprint": "%CLIENT_DEVICE_FINGERPRINT%",
                  "response_code_details": "%RESPONSE_CODE_DETAILS%",
                  "response_trailers_bytes":"%RESPONSE_TRAILERS_BYTES%"
                 },
                 "request": {
                  "raw_start_line": "%REQ_LINE%",
                  "raw_headers": "%ALL_REQ_HEADER%",
                  "raw_body": [
                   "%REQUEST_BODY%"
                  ]
                 },
                 "response": {
                  "raw_start_line": "%RESP_LINE%",
                  "raw_headers": "%ALL_RESP_HEADER%",
                  "raw_body": [
                   "%RESPONSE_BODY%"
                  ]
                 },
                 "filter_log": {
                   "gateway_name": "%FILTER_GATEWAY_NAME%",
                   "virtual_host_name": "%FILTER_VIRTUAL_HOST_NAME%",
                   "cluster_name": "%FILTER_CLUSTER_NAME%"
                 }
                }

          http_filters:
          - name: envoy.filters.http.body-to-metadata.1.0
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.body_to_metadata.v3.BodyToMetadataGlobal
              request_rule:
                max_body_bytes: 104857600

          - name: envoy.filters.http.lua
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
              "inline_code": "function envoy_on_request(request_handle)\n  request_handle:headers():add(\"sr-vsmatched\",\"false\");\nend\n"

          - name: envoy.filters.http.plugin-invoke.1.0
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.plugin_invoke.v3.PluginInvokeGlobal
              ipc_timeout: 100

          - name: composite
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.common.matching.v3.ExtensionWithMatcher
              extension_config:
                name: composite
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.composite.v3.Composite
              xds_matcher:
                matcher_list:
                  matchers:
                    - predicate:
                        or_matcher:
                          predicate:
                          - single_predicate:
                              input:
                                name: envoy.type.matcher.v3.HttpRequestHeaderMatchInput
                                typed_config:
                                  '@type': type.googleapis.com/envoy.type.matcher.v3.HttpRequestHeaderMatchInput
                                  header_name: sr-vsmatched
                              value_match:
                                prefix: "false"
                          - single_predicate:
                              input:
                                name: envoy.type.matcher.v3.HttpRequestHeaderMatchInput
                                typed_config:
                                  '@type': type.googleapis.com/envoy.type.matcher.v3.HttpRequestHeaderMatchInput
                                  header_name: host
                              value_match:
                                exact: 127.0.0.1:1000
                          # - single_predicate:
                          #     input:
                          #       name: envoy.type.matcher.v3.HttpRequestHeaderMatchInput
                          #       typed_config:
                          #         '@type': type.googleapis.com/envoy.type.matcher.v3.HttpRequestHeaderMatchInput
                          #         header_name: :path
                          #     value_match:
                          #       exact: /
                      on_match:
                        action:
                          name: envoy.extensions.filters.http.composite.v3.ExecuteFilterAction
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.filters.http.composite.v3.ExecuteFilterAction
                            typed_config:
                              # name: envoy.filters.http.lua
                              # typed_config:
                              #   "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                              #   "inline_code": "function envoy_on_request(request_handle)\n  request_handle:headers():add(\"xds-matcher\",\"true\");\nend\n"
                              name: www.srhino.com.user-identify.so.1.0.8.instance1
                              # name: envoy.filters.http.srhino_plugin_loader.1.0
                              typed_config:
                                "@type": type.googleapis.com/envoy.extensions.filters.http.srhino_plugin_loader.v3.SrhinoPluginLoaderGlobal
                                plugin_file_name: www.srhino.com.user-identify.so.1.0.8
                                config:

                                  cfgs:
                                  - infos:
                                    - app_address: 127.0.0.1:1000
                                      app_id: 11
                                      path_prefix: /
                                    - app_address: apple.ouryun.com:1000
                                      app_id: 12
                                      path_prefix: /
                                    - app_address: pear.ouryun.com:1000
                                      app_id: 13
